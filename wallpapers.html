<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Grainy Gradient Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ── System monitor slide-in panel ──────────────────────────────────── -->
    <div id="monitor">
        <span id="mon-clock">--:--:--</span>
        <span id="mon-date">--- -- ----</span>

        <span class="mon-title">System</span>

        <!-- CPU -->
        <div class="mon-section">
            <span class="mon-section-label">Processor</span>
            <div class="metric">
                <div class="metric-header">
                    <span class="metric-name" id="cpu-name">CPU</span>
                    <span class="metric-value" id="cpu-val">--%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill bar-cpu" id="cpu-bar" style="width:0%"></div>
                </div>
                <canvas class="sparkline" id="cpu-spark"></canvas>
            </div>
        </div>

        <hr class="mon-divider">

        <!-- GPU -->
        <div class="mon-section">
            <span class="mon-section-label">Graphics</span>
            <div class="metric">
                <div class="metric-header">
                    <span class="metric-name" id="gpu-name">GPU</span>
                    <span class="metric-value" id="gpu-val">--%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill bar-gpu" id="gpu-bar" style="width:0%"></div>
                </div>
                <canvas class="sparkline" id="gpu-spark"></canvas>
            </div>
        </div>

        <hr class="mon-divider">

        <!-- RAM -->
        <div class="mon-section">
            <span class="mon-section-label">Memory</span>
            <div class="metric">
                <div class="metric-header">
                    <span class="metric-name">RAM</span>
                    <span class="metric-value" id="ram-val">-- / -- GB</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill bar-ram" id="ram-bar" style="width:0%"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total</span>
                <span class="stat-val" id="ram-total">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Available</span>
                <span class="stat-val" id="ram-avail">--</span>
            </div>
        </div>

        <hr class="mon-divider">

        <!-- Network -->
        <div class="mon-section">
            <span class="mon-section-label">Network</span>
            <span class="stat-label" id="net-name"
                  style="display:block;margin-bottom:10px;font-size:11px;color:rgba(255,255,255,0.45)">--</span>
            <div class="metric">
                <div class="metric-header">
                    <span class="metric-name">↓ Down</span>
                    <span class="metric-value" id="net-down">-- Mb/s</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill bar-net" id="net-down-bar" style="width:0%"></div>
                </div>
            </div>
            <div class="metric">
                <div class="metric-header">
                    <span class="metric-name">↑ Up</span>
                    <span class="metric-value" id="net-up">-- Mb/s</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill bar-net" id="net-up-bar" style="width:0%"></div>
                </div>
            </div>
        </div>

        <p id="lively-notice">Live data requires Lively Wallpaper.<br>Showing simulated values.</p>
    </div>

    <!-- Pull tab -->
    <div id="monitor-tab" onclick="toggleMonitor()">⊞</div>

    <!-- ── Wallpaper info ─────────────────────────────────────────────────── -->
    <div id="info">
        <span id="vibeName">...</span>
        <span id="modeLabel">...</span>
        <span id="countdown"></span>
    </div>

    <!-- ── Vibe navigation ───────────────────────────────────────────────── -->
    <div id="ui">
        <div class="btn" onclick="changeVibe(-1)" title="Previous">
            <svg width="22" height="42" viewBox="0 0 22 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="11" y1="38" x2="11" y2="5" stroke="white" stroke-width="1.1"/>
                <polyline points="4,13 11,4 18,13" fill="none" stroke="white" stroke-width="1.1"
                          stroke-linejoin="round" stroke-linecap="round"/>
                <line x1="7" y1="38" x2="15" y2="38" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="btn" id="themeBtn" onclick="switchTheme()" title="Toggle light / dark"></div>
        <div class="btn" onclick="changeVibe(1)" title="Next">
            <svg width="22" height="42" viewBox="0 0 22 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="11" y1="4" x2="11" y2="37" stroke="white" stroke-width="1.1"/>
                <polyline points="4,29 11,38 18,29" fill="none" stroke="white" stroke-width="1.1"
                          stroke-linejoin="round" stroke-linecap="round"/>
                <line x1="7" y1="4" x2="15" y2="4" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <!-- ── WebGL canvas ───────────────────────────────────────────────────── -->
    <canvas id="canvas"></canvas>

    <!-- ── Fragment shader (inlined — cannot be a separate file due to       -->
    <!--    same-origin restrictions on reading script text in WebGL)         -->
    <script type="x-shader/x-fragment" id="fragmentShader">
        precision mediump float;
        uniform float u_time;
        uniform vec2  u_resolution;
        uniform vec3  u_colA;
        uniform vec3  u_colB;
        uniform vec3  u_colC;
        uniform float u_grain;
        uniform float u_modeA;
        uniform float u_modeB;
        uniform float u_modeFrac;
        uniform vec2  u_mouse;

        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        float noise(vec2 p) {
            vec2 i = floor(p); vec2 f = fract(p);
            vec2 u = f*f*(3.0-2.0*f);
            return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
                       mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
        }
        float fbm(vec2 p) {
            float v=0.0,a=0.5;
            for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.5;}
            return v;
        }
        float stars(vec2 uv) {
            float result=0.0;
            vec2 cell0=floor(uv*48.0); vec2 loc0=fract(uv*48.0);
            float rx0=hash(cell0+vec2(0.0,0.0)), ry0=hash(cell0+vec2(17.3,0.0));
            float r0=0.055+hash(cell0+vec2(0.0,99.1))*0.04;
            result+=smoothstep(r0,0.0,length(loc0-vec2(rx0,ry0)))*step(0.93,hash(cell0+vec2(99.1,37.4)))*0.9;
            vec2 cell1=floor(uv*31.0); vec2 loc1=fract(uv*31.0);
            float rx1=hash(cell1+vec2(31.7,58.3)), ry1=hash(cell1+vec2(58.3,31.7));
            float r1=0.06+hash(cell1+vec2(13.7,0.0))*0.04;
            result+=smoothstep(r1,0.0,length(loc1-vec2(rx1,ry1)))*step(0.90,hash(cell1+vec2(37.4,99.1)))*0.6;
            return result;
        }
        vec3 filmGrain(vec2 fc,vec3 col,float strength){
            vec2 pR=mod(fc,vec2(127.0,131.0));
            vec2 pG=mod(fc+vec2(37,61),vec2(113.0,109.0));
            vec2 pB=mod(fc+vec2(79,43),vec2(137.0,139.0));
            float nR=(hash(pR)-0.5)*(0.5+0.5*col.r);
            float nG=(hash(pG+vec2(269.5/127.1,183.3/311.7))-0.5)*(0.5+0.5*col.g);
            float nB=(hash(pB+vec2(419.2/127.1,371.9/311.7))-0.5)*(0.5+0.5*col.b);
            return col+vec3(nR,nG,nB)*strength;
        }
        vec3 evalPulse(vec2 uvR,float ar,float t,vec3 cA,vec3 cB,vec3 cC){
            vec2 srcA=vec2(ar*0.28+0.18*sin(t*0.19),0.35+0.12*cos(t*0.23));
            vec2 srcB=vec2(ar*0.72+0.14*cos(t*0.17),0.65+0.10*sin(t*0.21));
            float dA=distance(uvR,srcA),dB=distance(uvR,srcB);
            float wA1=sin(dA*7.0-t*1.05)*0.5+0.5, wA2=sin(dA*12.0-t*0.8+0.9)*0.5+0.5;
            float wB1=sin(dB*6.5-t*0.95+1.7)*0.5+0.5, wB2=sin(dB*11.0-t*1.1+3.1)*0.5+0.5;
            float fA=smoothstep(3.0,0.0,dA),fB=smoothstep(3.0,0.0,dB);
            float moire=pow(wA1,3.0)*fA+pow(wB1,3.0)*fB;
            float sharp=pow(wA2,6.0)*fA+pow(wB2,6.0)*fB;
            vec3 c=mix(cA,cB,clamp(moire*0.7,0.0,1.0));
            c=mix(c,cC,clamp(sharp*0.8,0.0,1.0));
            c+=cC*exp(-dA*2.0)*0.3+cB*exp(-dB*2.0)*0.3;
            return c;
        }
        vec3 evalMode(int mode,vec2 uv,vec2 uvR,float ar,float t,vec3 cA,vec3 cB,vec3 cC,vec2 mouse){
            vec3 color=cA;
            vec2 px_bg=mouse*0.012, px_mid=mouse*0.028, px_fg=mouse*0.055;
            vec2 uvR_bg=uvR-px_bg*vec2(ar,1.0), uvR_mid=uvR-px_mid*vec2(ar,1.0), uvR_fg=uvR-px_fg*vec2(ar,1.0);
            vec2 uv_mid=uv-px_mid, uv_fg=uv-px_fg;
            if(mode==0){
                vec2 src=vec2(-0.55,-0.45); float d=distance(uvR_bg,src);
                float pA=d*4.8-t*0.48; float ringA=pow(max(0.0,smoothstep(0.0,1.0,sin(pA))*exp(-max(0.0,-sin(pA))*2.5)),2.5);
                float pB=d*7.2-t*0.62+1.8; float ringB=pow(max(0.0,smoothstep(0.0,1.0,sin(pB))*exp(-max(0.0,-sin(pB))*3.2)),4.0);
                float pC=d*5.5-t*0.35+3.7; float ringC=pow(max(0.0,smoothstep(0.0,1.0,sin(pC))*exp(-max(0.0,-sin(pC))*2.8)),3.5);
                float falloff=smoothstep(5.5,0.3,d);
                color=mix(cA,cB,ringA*falloff); color=mix(color,cC,ringB*falloff*0.85);
                color=mix(color,cB*0.6+cC*0.4,ringC*falloff*0.55);
                color+=cB*exp(-d*2.2)*0.15+cC*exp(-d*3.0)*0.10;
            }else if(mode==1){
                float warp=fbm(vec2(uv_mid.x*2.4+t*0.10,uv_mid.y*0.8-t*0.06))*0.45;
                float warp2=fbm(vec2(uv_mid.x*1.3-t*0.08,uv_mid.y*1.8+t*0.04))*0.30;
                float curtain=fbm(vec2((uv_mid.x+warp)*3.2,(uv_mid.y+warp2)*0.85+t*0.04));
                float warp3=fbm(vec2(uv_mid.x*3.5-t*0.14,uv_mid.y*1.2+t*0.09))*0.3;
                float curtain2=fbm(vec2((uv_mid.x+warp3)*5.0+1.7,uv_mid.y*1.1-t*0.07+2.3));
                float band=smoothstep(0.0,0.5,uv.y)*smoothstep(1.0,0.38,uv.y);
                float arc=exp(-pow((uv.y-0.28)*12.0,2.0))*0.7;
                vec2 shimUV=vec2(uv_mid.x*11.0+t*0.5,uv_mid.y*6.0-t*0.3);
                float shimmer=fbm(shimUV), shimmer2=fbm(shimUV*0.64+vec2(1.3,0.7));
                color=mix(cA,cB,curtain*band*1.3+arc); color=mix(color,cC,curtain2*band*0.65);
                color+=cC*shimmer*band*pow(curtain,2.5)*0.8+cB*shimmer2*band*pow(curtain2,2.0)*0.4;
                color+=mix(cB,cC,0.6)*pow(curtain,5.0)*smoothstep(0.35,0.55,uv.y)*1.2+cB*arc*0.5;
                color+=vec3(stars(uv_fg)*(1.0-band*0.92)*(1.0-arc*2.0));
            }else if(mode==2){
                vec2 centre=vec2(ar*0.5,0.5); vec2 toC=normalize(uvR_mid-centre); float aberr=0.022;
                vec3 cr=evalPulse(uvR_mid+toC*aberr,ar,t,cA,cB,cC);
                vec3 cg=evalPulse(uvR_mid,ar,t,cA,cB,cC);
                vec3 cb=evalPulse(uvR_mid-toC*aberr,ar,t,cA,cB,cC);
                color=vec3(cr.r,cg.g,cb.b);
            }else if(mode==3){
                vec2 p=uvR_mid;
                vec2 q=vec2(fbm(p+t*0.07),fbm(p+vec2(1.7,9.2)+t*0.05));
                vec2 r2=vec2(fbm(p+2.0*q+vec2(1.7,9.2)+t*0.04),fbm(p+2.0*q+vec2(8.3,2.8)+t*0.05));
                float f=fbm(p+2.5*r2);
                color=mix(cA,cB,clamp(f*2.0,0.0,1.0)); color=mix(color,cC,clamp(f*f*4.0-1.5,0.0,1.0));
            }else if(mode==4){
                vec2 p0=vec2(0.22+0.18*sin(t*0.13),0.28+0.15*cos(t*0.11));
                vec2 p1=vec2(ar-0.22+0.15*cos(t*0.09),0.32+0.12*sin(t*0.14));
                vec2 p2=vec2(0.28+0.12*cos(t*0.17),0.72+0.10*sin(t*0.12));
                vec2 p3=vec2(ar-0.28+0.18*sin(t*0.10),0.68+0.14*cos(t*0.15));
                float d0=1.0/(distance(uvR_bg,p0)+0.01), d1=1.0/(distance(uvR_bg,p1)+0.01);
                float d2=1.0/(distance(uvR_bg,p2)+0.01), d3=1.0/(distance(uvR_bg,p3)+0.01);
                float total=d0+d1+d2+d3;
                vec3 c3=mix(cB,cC,0.5+0.5*sin(t*0.07));
                color=cA*(d0/total)+cB*(d1/total)+cC*(d2/total)+c3*(d3/total);
                color=mix(color,cC,fbm(uvR_bg*0.7+vec2(t*0.04,t*0.03))*0.05);
            }else if(mode==5){
                vec2 p_mid=uvR_mid, p_fg=uvR_fg, p_bg=uvR_bg;
                float wA=fbm(p_mid*2.1+vec2(t*0.11,t*0.07));
                float wB=fbm(p_mid*1.8+vec2(-t*0.09,t*0.13)+vec2(3.1,1.7));
                float c1=sin((p_mid.x*8.0+wA*2.5)-t*0.9)*0.5+0.5;
                float c2=sin((p_mid.y*7.0+wB*2.0)+t*0.7+1.4)*0.5+0.5;
                float c3=sin(((p_mid.x+p_mid.y)*5.5+wA*1.8)-t*0.5+2.7)*0.5+0.5;
                float caustic=clamp((pow(c1*c2,2.0)+pow(c2*c3,2.0)*0.6)*1.8,0.0,1.0);
                float shimmer=fbm(p_fg*5.5+vec2(t*0.22,-t*0.18));
                float sparkle=pow(max(0.0,sin(p_fg.x*22.0+shimmer*4.0-t*1.4)*sin(p_fg.y*18.0+shimmer*3.5+t*1.1)),8.0);
                color=mix(cA,cB,caustic*smoothstep(0.0,0.4,uv.y));
                color=mix(color,cC,sparkle*0.7+shimmer*0.15);
                color+=cB*exp(-distance(p_bg,vec2(ar*0.85,0.82))*1.4)*0.4;
                color=mix(color,cC,smoothstep(0.75,1.0,uv.y)*fbm(p_mid*4.0+t*0.08)*0.3);
            }else{
                vec2 sun=vec2(ar*(0.5+0.06*sin(t*0.08)),-0.15+0.04*sin(t*0.05));
                float dSun=distance(uvR_mid,sun);
                float skyT=clamp(pow(clamp(uv.y,0.0,1.0),0.75)+fbm(vec2(uv_mid.x*1.2+t*0.06,t*0.04))*0.18,0.0,1.0);
                vec3 sky=mix(cA,cB,smoothstep(0.0,0.55,skyT));
                sky=mix(sky,cC,smoothstep(0.35,1.0,skyT));
                sky+=mix(cA,vec3(1.0,0.97,0.88),0.5)*exp(-dSun*1.6)*0.55;
                sky+=mix(cA,vec3(1.0,0.95,0.85),0.7)*exp(-pow((uv.y+fbm(vec2(uv_mid.x*3.5+t*0.07,t*0.05))*0.06-0.18)*9.0,2.0))*0.35;
                float cloudWarp=fbm(vec2(uv_mid.x*1.8-t*0.04,uv_mid.y*1.4+t*0.03));
                float cloud=fbm(vec2((uv_mid.x+cloudWarp*0.3)*2.5,uv_mid.y*2.2+t*0.05+0.8));
                sky=mix(sky,mix(cB,cC,smoothstep(0.3,0.7,cloud)),cloud*smoothstep(0.3,0.8,uv.y)*0.4);
                sky=max(sky,vec3(0.72,0.48,0.42));
                color=sky;
            }
            return color;
        }
        void main(){
            vec2 uv=gl_FragCoord.xy/u_resolution.xy;
            float ar=u_resolution.x/u_resolution.y;
            vec2 uvR=vec2(uv.x*ar,uv.y);
            float t=u_time*0.18;
            int mA=int(u_modeA+0.5), mB=int(u_modeB+0.5);
            vec3 color;
            if(u_modeFrac>=0.999){
                color=evalMode(mB,uv,uvR,ar,t,u_colA,u_colB,u_colC,u_mouse);
            }else{
                vec3 cA=evalMode(mA,uv,uvR,ar,t,u_colA,u_colB,u_colC,u_mouse);
                vec3 cB=evalMode(mB,uv,uvR,ar,t,u_colA,u_colB,u_colC,u_mouse);
                color=mix(cA,cB,u_modeFrac);
            }
            color=filmGrain(gl_FragCoord.xy,color,u_grain);
            gl_FragColor=vec4(color,1.0);
        }
    </script>

    <!-- system.js before gradients.js — toggleMonitor() must exist when     -->
    <!-- gradients.js binds the 'M' key handler                              -->
    <script src="js/system.lively.js"></script>
    <script src="js/gradients.js"></script>

</body>
</html>
